<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Swiss Digital Banking Digest · banking.multikanal.ch</title>
<meta name="description" id="page-desc" content="Swiss Digital Banking Digest · banking.multikanal.ch">
<style>
:root {
  --bg: #faf8f4;
  --tile-bg: #1a1a1a;
  --tile-text: #e8e4dc;
  --text: #1a1a1a;
  --text-mid: #3d3832;
  --text-light: #8B7355;
  --gold: #c8a96e;
  --red: #c0392b;
  --border: #1a1a1a;
  --border-light: #d4cfc8;
  --font-body: Georgia, 'Times New Roman', serif;
  --font-mono: 'Courier New', Courier, monospace;
}
[data-theme="dark"] {
  --bg: #141210;
  --tile-bg: #1e1c19;
  --tile-text: #e8e4dc;
  --text: #e0dbd2;
  --text-mid: #b0a898;
  --text-light: #a09070;
  --border: #a09070;
  --border-light: #2a2820;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  transition: background 0.2s, color 0.2s;
}

/* LOADING */
#loading {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: var(--font-mono); font-size: 0.75rem;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-light);
}
#error { display: none; text-align: center; padding: 4rem 2rem; font-family: var(--font-mono); }
#error h2 { font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
#content { display: none; }

/* HEADER */
.site-header {
  border-bottom: 2px solid var(--border);
  padding: 1rem 2rem 0.75rem;
}
.header-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 1.5rem; flex-wrap: wrap;
}
.site-title {
  font-family: var(--font-body);
  font-size: clamp(1.3rem, 3vw, 1.9rem);
  font-weight: bold; letter-spacing: -0.02em; line-height: 1.1;
}
.site-title span { color: var(--gold); }
.header-right { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
.kw-block { text-align: right; }
.kw-label {
  font-family: var(--font-mono); font-size: 0.58rem;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-light);
}
.kw-value { font-size: 1.05rem; font-weight: bold; }
.header-controls { display: flex; align-items: center; gap: 0.5rem; }
.toggle-group { display: flex; border: 1px solid var(--border); overflow: hidden; }
.toggle-btn {
  background: none; border: none;
  font-family: var(--font-mono); font-size: 0.6rem; font-weight: bold;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.3rem 0.65rem; cursor: pointer; color: var(--text-light);
  transition: all 0.15s;
}
.toggle-btn.active { background: var(--text); color: var(--bg); }
.toggle-btn:hover:not(.active) { color: var(--text); }
.icon-btn {
  background: none; border: 1px solid var(--border);
  font-size: 0.9rem; padding: 0.27rem 0.6rem; cursor: pointer;
  color: var(--text); transition: all 0.15s; line-height: 1;
}
.icon-btn:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
.sources-line {
  margin-top: 0.45rem;
  font-family: var(--font-mono); font-size: 0.58rem;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-light);
}

/* CONTAINER */
.container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

/* METRICS ROW */
.metrics-section { padding: 1.5rem 0; border-bottom: 1px solid var(--border-light); }
.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
.metric-tile {
  background: var(--tile-bg); color: var(--tile-text);
  padding: 1.1rem 1.1rem 0.9rem; overflow: hidden;
}
.metric-tag {
  font-family: var(--font-mono); font-size: 0.56rem;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-light);
  margin-bottom: 0.35rem;
}
.metric-value {
  font-family: var(--font-body); font-size: 1.45rem; font-weight: bold;
  line-height: 1.1; margin-bottom: 0.3rem;
}
.metric-value.positive { color: var(--gold); }
.metric-value.negative { color: var(--red); }
.metric-context {
  font-family: var(--font-mono); font-size: 0.57rem; letter-spacing: 0.04em;
  color: rgba(200,190,170,0.5); text-transform: uppercase; line-height: 1.45;
}
.metric-bar-track {
  height: 1px; background: rgba(200,169,110,0.18); margin-top: 0.85rem;
}
.metric-bar-fill { height: 100%; background: var(--gold); }

/* TOP STORIES */
.top-stories-section { padding: 2rem 0; border-bottom: 2px solid var(--border); }
.section-eyebrow {
  font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-light);
  padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-light);
  margin-bottom: 1.25rem;
}
.top-stories-grid {
  display: grid; grid-template-columns: 1.5fr 1fr; gap: 0;
}
.story-main {
  padding-right: 2rem;
  border-right: 0.5px solid var(--border);
}
.story-kicker {
  font-family: var(--font-mono); font-size: 0.58rem;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold);
  margin-bottom: 0.55rem;
}
.story-main h2 {
  font-size: clamp(1.15rem, 2.4vw, 1.65rem);
  line-height: 1.2; font-weight: bold; letter-spacing: -0.02em;
  margin-bottom: 0.8rem;
}
.story-main h2 a, .story-minor h3 a, .item-headline a {
  color: inherit; text-decoration: none;
}
.story-main h2 a:hover, .story-minor h3 a:hover, .item-headline a:hover {
  color: var(--gold); text-decoration: underline; text-underline-offset: 3px;
}
.story-body {
  font-size: 0.88rem; line-height: 1.72; color: var(--text-mid); margin-bottom: 0.9rem;
}
.story-figures { display: flex; flex-wrap: wrap; gap: 0.55rem; margin-bottom: 0.85rem; }
.fig-chip { border-left: 2px solid var(--gold); padding: 0.22rem 0.55rem; background: rgba(200,169,110,0.07); }
.fig-val { font-family: var(--font-body); font-weight: bold; font-size: 0.85rem; display: block; }
.fig-label {
  font-family: var(--font-mono); font-size: 0.54rem;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-light);
}
.story-source {
  font-family: var(--font-mono); font-size: 0.57rem;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-light);
}
.stories-stack { padding-left: 2rem; display: flex; flex-direction: column; }
.story-minor {
  padding: 1rem 0; border-bottom: 0.5px solid var(--border-light); flex: 1;
}
.story-minor:first-child { padding-top: 0; }
.story-minor:last-child { border-bottom: none; padding-bottom: 0; }
.story-minor h3 {
  font-size: 0.92rem; line-height: 1.25; font-weight: bold; margin-bottom: 0.35rem;
}
.story-minor p { font-size: 0.76rem; color: var(--text-mid); line-height: 1.65; }

/* SECTIONS */
.sections-section { padding: 2rem 0; border-bottom: 1px solid var(--border-light); }
.filter-bar {
  display: none; align-items: center; gap: 0.75rem;
  margin-bottom: 1.25rem; padding: 0.45rem 0.9rem;
  border-left: 3px solid var(--gold); background: rgba(200,169,110,0.06);
  font-family: var(--font-mono); font-size: 0.6rem;
  letter-spacing: 0.08em; color: var(--text-mid);
}
.filter-bar.visible { display: flex; }
.filter-clear {
  background: none; border: none; color: var(--gold); cursor: pointer;
  font-family: var(--font-mono); font-size: 0.6rem; font-weight: bold;
  margin-left: auto; letter-spacing: 0.06em;
}
.sections-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
.section-col { padding: 0 1.75rem; border-right: 0.5px solid var(--border); }
.section-col:first-child { padding-left: 0; }
.section-col:last-child { border-right: none; padding-right: 0; }
.section-col-header {
  font-family: var(--font-mono); font-size: 0.6rem; font-weight: bold;
  letter-spacing: 0.16em; text-transform: uppercase;
  padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
  margin-bottom: 0.9rem;
}
.item-card { padding: 0.8rem 0; border-bottom: 0.5px solid var(--border-light); }
.item-card:last-child { border-bottom: none; }
.item-headline { font-size: 0.8rem; font-weight: bold; line-height: 1.3; margin-bottom: 0.28rem; }
.item-body { font-size: 0.73rem; color: var(--text-mid); line-height: 1.62; margin-bottom: 0.28rem; }
.item-source {
  font-family: var(--font-mono); font-size: 0.55rem;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-light);
  display: block; margin-bottom: 0.28rem;
}
.item-kf { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.35rem; }
.item-fig { border-left: 1.5px solid var(--gold); padding: 0.18rem 0.45rem; background: rgba(200,169,110,0.06); }
.item-fig-val { font-family: var(--font-body); font-weight: bold; font-size: 0.72rem; display: block; }
.item-fig-label {
  font-family: var(--font-mono); font-size: 0.5rem;
  letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-light);
}
.item-tags { display: flex; flex-wrap: wrap; gap: 0.22rem; margin-top: 0.35rem; }
.item-tag {
  font-family: var(--font-mono); font-size: 0.53rem; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--gold);
  border: 1px solid rgba(200,169,110,0.3); padding: 1px 5px;
  cursor: pointer; transition: all 0.12s;
}
.item-tag:hover, .item-tag.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }

/* BOTTOM ROW */
.bottom-row {
  display: grid; grid-template-columns: 1fr 1.45fr;
  gap: 0; padding: 2rem 0;
}
.reading-col { padding-right: 2rem; border-right: 0.5px solid var(--border); }
.strategic-col { padding-left: 2rem; }
.col-header {
  font-family: var(--font-mono); font-size: 0.6rem; font-weight: bold;
  letter-spacing: 0.16em; text-transform: uppercase;
  padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
  margin-bottom: 0.9rem;
}
.reading-item { display: flex; gap: 0.8rem; padding: 0.6rem 0; border-bottom: 0.5px solid var(--border-light); align-items: flex-start; }
.reading-item:last-child { border-bottom: none; }
.reading-num { font-family: var(--font-mono); font-size: 0.65rem; color: var(--gold); flex-shrink: 0; margin-top: 0.1rem; }
.reading-title { font-size: 0.78rem; font-weight: bold; line-height: 1.3; margin-bottom: 0.12rem; }
.reading-title a { color: inherit; text-decoration: none; }
.reading-title a:hover { color: var(--gold); text-decoration: underline; text-underline-offset: 2px; }
.reading-source {
  font-family: var(--font-mono); font-size: 0.54rem;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-light);
}
.strategic-box {
  background: var(--tile-bg); color: var(--tile-text);
  padding: 1.4rem 1.5rem; border-left: 3px solid var(--gold);
}
.strategic-target {
  font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 0.7rem;
}
.strategic-body {
  font-size: 0.76rem; color: rgba(232,228,220,0.7); line-height: 1.72;
  margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 0.5px solid rgba(255,255,255,0.07);
}
.actions-label {
  font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: rgba(232,228,220,0.3); margin-bottom: 0.6rem;
}
.action-item { display: flex; gap: 0.6rem; padding: 0.45rem 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); align-items: flex-start; }
.action-item:last-child { border-bottom: none; }
.action-dot { width: 5px; height: 5px; background: var(--gold); flex-shrink: 0; margin-top: 0.42rem; }
.action-text { font-size: 0.73rem; color: rgba(232,228,220,0.72); line-height: 1.62; }

/* FOOTER */
footer {
  padding: 0.9rem 2rem; border-top: 1px solid var(--border-light);
  font-family: var(--font-mono); font-size: 0.58rem;
  letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-light);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem;
}
footer a { color: var(--gold); text-decoration: none; }
footer a:hover { text-decoration: underline; }

/* RESPONSIVE */
@media (max-width: 1000px) {
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .sections-grid { grid-template-columns: repeat(2, 1fr); }
  .section-col { padding: 0 1.5rem; }
  .section-col:first-child { padding-left: 0; }
  .section-col:nth-child(2) { border-right: none; padding-right: 0; }
  .section-col:nth-child(3) { padding-left: 0; border-right: 0.5px solid var(--border); border-top: 0.5px solid var(--border-light); padding-top: 1.25rem; margin-top: 1.25rem; }
  .section-col:nth-child(4) { border-top: 0.5px solid var(--border-light); padding-top: 1.25rem; margin-top: 1.25rem; border-right: none; padding-right: 0; }
  .bottom-row { grid-template-columns: 1fr; }
  .reading-col { border-right: none; padding-right: 0; padding-bottom: 1.5rem; border-bottom: 0.5px solid var(--border-light); }
  .strategic-col { padding-left: 0; padding-top: 1.5rem; }
}
@media (max-width: 680px) {
  .container { padding: 0 1.25rem; }
  .site-header { padding: 0.85rem 1.25rem 0.65rem; }
  .header-top { flex-direction: column; gap: 0.75rem; }
  .header-right { justify-content: space-between; width: 100%; }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); gap: 0.65rem; }
  .top-stories-grid { grid-template-columns: 1fr; }
  .story-main { padding-right: 0; border-right: none; border-bottom: 0.5px solid var(--border-light); padding-bottom: 1.5rem; margin-bottom: 1rem; }
  .stories-stack { padding-left: 0; }
  .sections-grid { grid-template-columns: 1fr; }
  .section-col { border-right: none !important; padding: 0 !important; border-top: 0.5px solid var(--border-light); padding-top: 1.25rem !important; margin-top: 1.25rem !important; }
  .section-col:first-child { border-top: none; padding-top: 0 !important; margin-top: 0 !important; }
  footer { flex-direction: column; text-align: center; gap: 0.3rem; }
}
</style>
</head>
<body>

<div id="loading">Laden …</div>
<div id="error"><h2>Digest nicht verfügbar</h2></div>

<div id="content">

  <header class="site-header">
    <div class="header-top">
      <div class="site-title">Swiss Digital <span>Banking</span> Digest</div>
      <div class="header-right">
        <div class="kw-block">
          <div class="kw-label">Kalenderwoche</div>
          <div class="kw-value" id="meta-kw">—</div>
          <div class="kw-label" id="meta-date"></div>
        </div>
        <div class="header-controls">
          <div class="toggle-group">
            <button class="toggle-btn active" id="btn-de">DE</button>
            <button class="toggle-btn" id="btn-en">EN</button>
          </div>
          <button class="icon-btn" id="btn-theme" title="Dark / Light Mode">☾</button>
        </div>
      </div>
    </div>
    <div class="sources-line">Quellen: FINMA · SNB · Fintechnews.ch · HSLU · BankingHub · Netzwoche</div>
  </header>

  <!-- METRICS ROW -->
  <section class="metrics-section">
    <div class="container">
      <div class="metrics-grid" id="metrics-grid"></div>
    </div>
  </section>

  <!-- TOP STORIES -->
  <section class="top-stories-section">
    <div class="container">
      <div class="section-eyebrow" id="eyebrow-top">Top 3 Entwicklungen</div>
      <div class="top-stories-grid">
        <div class="story-main" id="lead-story"></div>
        <div class="stories-stack" id="minor-stories"></div>
      </div>
    </div>
  </section>

  <!-- SECTIONS -->
  <section class="sections-section">
    <div class="container">
      <div class="filter-bar" id="filter-bar">
        <span id="filter-label"></span>
        <button class="filter-clear" id="filter-clear">× Entfernen</button>
      </div>
      <div class="sections-grid" id="sections-container"></div>
    </div>
  </section>

  <!-- BOTTOM ROW -->
  <section>
    <div class="container">
      <div class="bottom-row">
        <div class="reading-col">
          <div class="col-header" id="lbl-reading">Leseempfehlungen</div>
          <div id="reading-list"></div>
        </div>
        <div class="strategic-col">
          <div class="col-header" id="lbl-strategic">Strategische Implikationen</div>
          <div id="strategic-content"></div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <span id="footer-gen"></span>
    <a href="https://banking.multikanal.ch" target="_blank" rel="noopener">banking.multikanal.ch ↗</a>
  </footer>

</div>

<script>
const REPO_BASE = 'https://raw.githubusercontent.com/Zimphi75/multikanal/main/data/';

let currentLang = 'de';
let activeTag = null;
let globalData = null;

const UI_STRINGS = {
  de: {
    top: 'Top 3 Entwicklungen',
    reading: 'Leseempfehlungen',
    strategic: 'Strategische Implikationen',
    filtered: tag => `Gefiltert nach: ${tag}`,
    remove: '× Entfernen',
    loading: 'Laden …',
    for: 'Für',
    actions: 'Key Actions'
  },
  en: {
    top: 'Top 3 Developments',
    reading: 'Reading Recommendations',
    strategic: 'Strategic Implications',
    filtered: tag => `Filtered by: ${tag}`,
    remove: '× Clear',
    loading: 'Loading …',
    for: 'For',
    actions: 'Key Actions'
  }
};

function ui(key, ...args) {
  const fn = UI_STRINGS[currentLang][key];
  return typeof fn === 'function' ? fn(...args) : fn;
}

function t(obj, key) {
  return obj[`${key}_${currentLang}`] || obj[`${key}_de`] || '';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── THEME ── */
function initTheme() {
  const saved = localStorage.getItem('mk_theme') || 'light';
  applyTheme(saved);
}
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  document.getElementById('btn-theme').textContent = t === 'dark' ? '☀' : '☾';
}
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('mk_theme', next);
  applyTheme(next);
}

/* ── LANGUAGE ── */
function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.getElementById('btn-de').classList.toggle('active', lang === 'de');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  if (globalData) rerender();
}

/* ── TAG FILTER ── */
function filterByTag(tag) {
  activeTag = tag;
  document.querySelectorAll('.item-card[data-tags]').forEach(c => {
    c.style.display = c.dataset.tags.split(',').includes(tag) ? '' : 'none';
  });
  document.querySelectorAll('.item-tag').forEach(el =>
    el.classList.toggle('active', el.dataset.tag === tag));
  const bar = document.getElementById('filter-bar');
  bar.classList.add('visible');
  document.getElementById('filter-label').textContent = ui('filtered', tag);
  document.getElementById('filter-clear').textContent = ui('remove');
}
function clearTagFilter() {
  activeTag = null;
  document.querySelectorAll('.item-card[data-tags]').forEach(c => c.style.display = '');
  document.querySelectorAll('.item-tag').forEach(el => el.classList.remove('active'));
  document.getElementById('filter-bar').classList.remove('visible');
}

/* ── METRICS ── */
function collectMetrics(data) {
  const out = [];
  for (const s of (data.top_stories || []))
    for (const kf of (s.key_figures || [])) {
      out.push({ ...kf, ctx: t(s, 'headline') });
      if (out.length >= 4) return out;
    }
  for (const sec of (data.sections || []))
    for (const item of (sec.items || []))
      for (const kf of (item.key_figures || [])) {
        out.push({ ...kf, ctx: t(item, 'headline') });
        if (out.length >= 4) return out;
      }
  return out;
}
function valueClass(v) { return /[-−]/.test(String(v)) ? 'negative' : 'positive'; }
function barWidth(val, label) {
  const m = String(val).match(/(\d+[\.,]?\d*)\s*%/);
  if (m) return Math.min(parseFloat(m[1].replace(',','.')), 100);
  let h = 0;
  for (const c of String(label)) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return 35 + (h % 55);
}

/* ── RENDER ── */
function renderMeta(m) {
  const kw = m.kw || '–', yr = m.year || '';
  document.getElementById('meta-kw').textContent = `KW ${kw} / ${yr}`;
  const opts = { day: 'numeric', month: 'short' };
  const from = m.date_from ? new Date(m.date_from).toLocaleDateString('de-CH', opts) : '';
  const to   = m.date_to   ? new Date(m.date_to).toLocaleDateString('de-CH', { ...opts, year: 'numeric' }) : '';
  document.getElementById('meta-date').textContent = from && to ? `${from} – ${to}` : '';
  document.getElementById('footer-gen').textContent =
    `Generiert mit ${m.generator || 'n8n + Claude Sonnet'} · ${m.slug || ''}`;
  document.getElementById('page-title').textContent =
    `Swiss Digital Banking Digest · KW ${kw}/${yr} · banking.multikanal.ch`;
  const desc = document.getElementById('page-desc');
  if (desc) desc.setAttribute('content', `Swiss Digital Banking Digest KW ${kw}/${yr} · ${m.slug || ''}`);
}

function renderMetrics(data) {
  const grid = document.getElementById('metrics-grid');
  collectMetrics(data).forEach(kf => {
    const lbl = kf[`label_${currentLang}`] || kf.label_de || '';
    const w = barWidth(kf.value, lbl);
    grid.innerHTML += `
      <div class="metric-tile">
        <div class="metric-tag">${esc(lbl)}</div>
        <div class="metric-value ${valueClass(kf.value)}">${esc(kf.value)}</div>
        <div class="metric-context">${esc((kf.ctx || '').substring(0, 52))}${(kf.ctx||'').length > 52 ? '…' : ''}</div>
        <div class="metric-bar-track"><div class="metric-bar-fill" style="width:${w}%"></div></div>
      </div>`;
  });
}

function renderTopStories(stories) {
  if (!stories?.length) return;
  document.getElementById('eyebrow-top').textContent = ui('top');
  const lead = stories[0];
  const kf = (lead.key_figures || []).slice(0,3).map(k =>
    `<div class="fig-chip">
      <span class="fig-val">${esc(k.value)}</span>
      <span class="fig-label">${esc(k[`label_${currentLang}`] || k.label_de)}</span>
    </div>`).join('');
  const h2 = lead.source_url
    ? `<a href="${esc(lead.source_url)}" target="_blank" rel="noopener">${esc(t(lead,'headline'))}</a>`
    : esc(t(lead,'headline'));
  document.getElementById('lead-story').innerHTML = `
    <div class="story-kicker">${esc(t(lead,'category'))}</div>
    <h2>${h2}</h2>
    <p class="story-body">${esc(t(lead,'body'))}</p>
    ${kf ? `<div class="story-figures">${kf}</div>` : ''}
    <div class="story-source">${esc(lead.source_name)}${lead.source_date ? ' · '+esc(lead.source_date) : ''}</div>`;

  const stack = document.getElementById('minor-stories');
  stories.slice(1).forEach(s => {
    const h3 = s.source_url
      ? `<a href="${esc(s.source_url)}" target="_blank" rel="noopener">${esc(t(s,'headline'))}</a>`
      : esc(t(s,'headline'));
    stack.innerHTML += `
      <div class="story-minor">
        <div class="story-kicker">${esc(t(s,'category'))}</div>
        <h3>${h3}</h3>
        <p>${esc(t(s,'body'))}</p>
        <div class="story-source" style="margin-top:0.45rem">${esc(s.source_name)}${s.source_date?' · '+esc(s.source_date):''}</div>
      </div>`;
  });
}

const SECTION_LABELS = {
  regulatory:    { de: 'Regulierung & Compliance', en: 'Regulation & Compliance' },
  market:        { de: 'Markt & Wettbewerb',       en: 'Market & Competition'    },
  ai_tech:       { de: 'KI & Technologie',          en: 'AI & Technology'         },
  international: { de: 'Internationale Trends',     en: 'International Trends'    }
};

function renderSections(sections) {
  const container = document.getElementById('sections-container');
  ['regulatory','market','ai_tech','international'].forEach(id => {
    const sec = sections.find(s => s.id === id);
    if (!sec) return;
    const label = SECTION_LABELS[id]?.[currentLang] || t(sec,'title') || id;
    const col = document.createElement('div');
    col.className = 'section-col'; col.id = id;
    const items = (sec.items || []).slice(0,3).map(item => {
      const srcObj = (item.sources || [])[0] || {};
      const h = srcObj.url
        ? `<a href="${esc(srcObj.url)}" target="_blank" rel="noopener">${esc(t(item,'headline'))}</a>`
        : esc(t(item,'headline'));
      const kf = (item.key_figures || []).slice(0,2).map(k =>
        `<div class="item-fig">
          <span class="item-fig-val">${esc(k.value)}</span>
          <span class="item-fig-label">${esc(k[`label_${currentLang}`] || k.label_de)}</span>
        </div>`).join('');
      const tagsArr = item.tags || [];
      const tagHtml = tagsArr.slice(0,3).map(tag =>
        `<span class="item-tag" data-tag="${esc(tag)}">${esc(tag)}</span>`).join('');
      return `<div class="item-card" data-tags="${esc(tagsArr.join(','))}">
        <div class="item-headline">${h}</div>
        <p class="item-body">${esc(t(item,'body'))}</p>
        ${srcObj.name ? `<span class="item-source">${esc(srcObj.name)}</span>` : ''}
        ${kf ? `<div class="item-kf">${kf}</div>` : ''}
        ${tagHtml ? `<div class="item-tags">${tagHtml}</div>` : ''}
      </div>`;
    }).join('');
    col.innerHTML = `<div class="section-col-header">${esc(label)}</div>${items}`;
    container.appendChild(col);
  });
}

function renderReading(items) {
  document.getElementById('lbl-reading').textContent = ui('reading');
  const el = document.getElementById('reading-list');
  (items || []).slice(0,5).forEach((item, i) => {
    el.innerHTML += `
      <div class="reading-item">
        <div class="reading-num">${String(i+1).padStart(2,'0')}</div>
        <div>
          <div class="reading-title"><a href="${esc(item.url||'#')}" target="_blank" rel="noopener">${esc(t(item,'title'))}</a></div>
          ${item.source ? `<div class="reading-source">${esc(item.source)}</div>` : ''}
        </div>
      </div>`;
  });
}

function renderStrategic(si) {
  document.getElementById('lbl-strategic').textContent = ui('strategic');
  if (!si) return;
  const target = si[`target_${currentLang}`] || si.target_de || '';
  const body   = si[`body_${currentLang}`]   || si.body_de   || '';
  const el = document.getElementById('strategic-content');
  el.innerHTML = `
    <div class="strategic-box">
      <div class="strategic-target">${esc(ui('for'))} ${esc(target)}</div>
      <div class="strategic-body">${esc(body)}</div>
      <div class="actions-label">${esc(ui('actions'))}</div>
      ${(si.key_actions || []).map(a => `
        <div class="action-item">
          <div class="action-dot"></div>
          <div class="action-text">${esc(a[`action_${currentLang}`] || a.action_de)}</div>
        </div>`).join('')}
    </div>`;
}

function renderAll(data) {
  renderMetrics(data);
  renderTopStories(data.top_stories || []);
  renderSections(data.sections || []);
  renderReading(data.reading_recommendations || []);
  renderStrategic(data.strategic_implications || null);
}

function rerender() {
  document.getElementById('metrics-grid').innerHTML = '';
  document.getElementById('lead-story').innerHTML = '';
  document.getElementById('minor-stories').innerHTML = '';
  document.getElementById('sections-container').innerHTML = '';
  document.getElementById('reading-list').innerHTML = '';
  document.getElementById('strategic-content').innerHTML = '';
  renderAll(globalData);
  if (activeTag) filterByTag(activeTag);
}

/* ── EVENTS ── */
document.addEventListener('click', e => {
  if (e.target.closest('.item-tag')) {
    const tag = e.target.closest('.item-tag').dataset.tag;
    tag === activeTag ? clearTagFilter() : filterByTag(tag);
    return;
  }
  if (e.target.closest('#filter-clear')) { clearTagFilter(); return; }
  if (e.target.closest('#btn-de'))    { setLang('de'); return; }
  if (e.target.closest('#btn-en'))    { setLang('en'); return; }
  if (e.target.closest('#btn-theme')) { toggleTheme(); return; }
});

/* ── ISO WEEK ── */
function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return { kw: Math.ceil((((d - yearStart) / 86400000) + 1) / 7), year: d.getUTCFullYear() };
}
function getCandidateSlugs() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('kw')) return [p.get('kw')];
  const slugs = [];
  const now = new Date();
  for (let i = 0; i < 5; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i * 7);
    const { kw, year } = getISOWeek(d);
    slugs.push(`kw${kw}-${year}`);
  }
  return slugs;
}

/* ── LOAD ── */
async function loadDigest() {
  for (const slug of getCandidateSlugs()) {
    try {
      const res = await fetch(`${REPO_BASE}${slug}.json?t=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      globalData = await res.json();
      break;
    } catch(e) { console.log(`Not found: ${slug}`); }
  }
  if (!globalData) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    return;
  }
  renderMeta(globalData.meta || {});
  renderAll(globalData);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

initTheme();
loadDigest();
</script>
