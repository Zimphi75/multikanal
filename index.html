<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Swiss Digital Banking Digest · banking.multikanal.ch</title>
<meta name="description" id="page-desc" content="Swiss Digital Banking Digest · banking.multikanal.ch">
<style>
:root {
  --bg: #faf8f4;
  --tile-bg: #1a1a1a;
  --tile-text: #e8e4dc;
  --text: #1a1a1a;
  --text-mid: #3d3832;
  --text-light: #8B7355;
  --gold: #c8a96e;
  --red: #c0392b;
  --border: #1a1a1a;
  --border-light: #d4cfc8;
  --font-body: Georgia, 'Times New Roman', serif;
  --font-mono: 'Courier New', Courier, monospace;
}
[data-theme="dark"] {
  --bg: #141210;
  --tile-bg: #1e1c19;
  --tile-text: #e8e4dc;
  --text: #e0dbd2;
  --text-mid: #b0a898;
  --text-light: #a09070;
  --border: #a09070;
  --border-light: #4a453d;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  transition: background 0.2s, color 0.2s;
}

/* LOADING */
#loading {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: var(--font-mono); font-size: 0.75rem;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-light);
}
#error { display: none; text-align: center; padding: 4rem 2rem; font-family: var(--font-mono); }
#error h2 { font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
#content { display: none; }

/* HEADER */
.site-header {
  border-bottom: 2px solid var(--border);
  padding: 1rem 2rem 0.75rem;
}
.header-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 1.5rem; flex-wrap: wrap;
}
.site-title {
  font-family: var(--font-body);
  font-size: clamp(1.3rem, 3vw, 1.9rem);
  font-weight: bold; letter-spacing: -0.02em; line-height: 1.1;
}
.site-title span { color: var(--gold); }
.header-right { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
.kw-block { text-align: right; }
.kw-label {
  font-family: var(--font-mono); font-size: 0.58rem;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-light);
}
.kw-value { font-size: 1.05rem; font-weight: bold; }
.header-controls { display: flex; align-items: center; gap: 0.5rem; }
.toggle-group { display: flex; border: 1px solid var(--border); overflow: hidden; }
.toggle-btn {
  background: none; border: none;
  font-family: var(--font-mono); font-size: 0.6rem; font-weight: bold;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.3rem 0.65rem; cursor: pointer; color: var(--text-light);
  transition: all 0.15s;
}
.toggle-btn.active { background: var(--text); color: var(--bg); }
.toggle-btn:hover:not(.active) { color: var(--text); }
.icon-btn {
  background: none; border: 1px solid var(--border);
  font-size: 0.9rem; padding: 0.27rem 0.6rem; cursor: pointer;
  color: var(--text); transition: all 0.15s; line-height: 1;
}
.icon-btn:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
.sources-line {
  margin-top: 0.45rem;
  font-family: var(--font-mono); font-size: 0.58rem;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-light);
}

/* CONTAINER */
.container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

/* MARKET DATA ROW */
.market-section {
  background: var(--bg);
  padding: 0.75rem 0;
  border-bottom: 2px solid var(--border-light);
}
.market-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
  background: var(--border-light);
}
.market-tile {
  background: var(--bg); padding: 0.8rem 1.1rem 0.6rem;
  display: flex; flex-direction: column; gap: 0.3rem;
}
.market-top-row { display: flex; justify-content: space-between; align-items: baseline; }
.market-symbol {
  font-family: var(--font-mono); font-size: 1rem; font-weight: bold; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--gold);
}
.market-updated {
  font-family: var(--font-mono); font-size: 0.5rem;
  color: var(--text-light); letter-spacing: 0.04em; opacity: 0.55;
}
.market-mid-row { display: flex; justify-content: space-between; align-items: baseline; }
.market-value {
  font-family: var(--font-body); font-size: 1.4rem; font-weight: bold;
  color: var(--text); line-height: 1.1;
}
.market-change {
  font-family: var(--font-mono); font-size: 0.65rem; font-weight: bold;
  letter-spacing: 0.06em;
}
.market-change.up { color: #2e8b57; }
.market-change.down { color: var(--red); }
.market-change.flat { color: var(--text-light); }
.market-chart { width: 100%; margin: 0.2rem 0 0.1rem; }
.market-chart svg { width: 100%; height: 52px; display: block; }
.market-ranges {
  display: flex; gap: 2px; margin-top: 0.15rem;
}
.mkt-range-btn {
  font-family: var(--font-mono); font-size: 0.52rem; letter-spacing: 0.06em;
  background: none; border: 1px solid var(--border-light); color: var(--text-light);
  padding: 1px 5px; cursor: pointer; transition: all 0.12s;
}
.mkt-range-btn:hover { border-color: var(--gold); color: var(--gold); }
.mkt-range-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

/* METRICS ROW */
.metrics-section { padding: 1.5rem 0; border-bottom: 1px solid var(--border-light); }
.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
.metric-tile {
  background: var(--tile-bg); color: var(--tile-text);
  padding: 1.1rem 1.1rem 0.9rem; overflow: hidden;
}
.metric-tag {
  font-family: var(--font-mono); font-size: 0.82rem;
  letter-spacing: 0.14em; text-transform: uppercase; color: rgba(232,228,220,0.9);
  margin-bottom: 0.35rem;
}
.metric-value {
  font-family: var(--font-body); font-size: 1.45rem; font-weight: bold;
  line-height: 1.1; margin-bottom: 0.3rem;
}
.metric-value.positive { color: var(--gold); }
.metric-value.negative { color: var(--red); }
.metric-context {
  font-family: var(--font-mono); font-size: 0.78rem; letter-spacing: 0.04em;
  color: rgba(232,228,220,0.78); text-transform: uppercase; line-height: 1.5;
}
.metric-bar-track {
  height: 1px; background: rgba(200,169,110,0.18); margin-top: 0.85rem;
}
.metric-bar-fill { height: 100%; background: var(--gold); }
a.metric-tile {
  display: block; text-decoration: none; color: inherit;
  transition: outline 0.15s;
}
a.metric-tile:hover { outline: 1px solid var(--gold); }

/* TOP STORIES */
.top-stories-section { padding: 2rem 0; border-bottom: 2px solid var(--border); }
.section-eyebrow {
  font-family: var(--font-mono); font-size: 1.45rem; font-weight: bold; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text-light);
  padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-light);
  margin-bottom: 1.25rem;
}
.top-stories-grid {
  display: grid; grid-template-columns: 1.5fr 1fr; gap: 0;
}
.story-main {
  padding-right: 2rem;
  border-right: 0.5px solid var(--border);
}
.story-kicker {
  font-family: var(--font-mono); font-size: 0.58rem;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold);
  margin-bottom: 0.55rem;
}
.story-main h2 {
  font-size: clamp(1.15rem, 2.4vw, 1.65rem);
  line-height: 1.2; font-weight: bold; letter-spacing: -0.02em;
  margin-bottom: 0.8rem;
}
.story-main h2 a, .story-minor h3 a, .item-headline a {
  color: inherit; text-decoration: none;
}
.story-main h2 a:hover, .story-minor h3 a:hover, .item-headline a:hover {
  color: var(--gold); text-decoration: underline; text-underline-offset: 3px;
}
.story-body {
  font-size: 1rem; line-height: 1.72; color: var(--text-mid); margin-bottom: 0.9rem;
}
.story-figures { display: flex; flex-wrap: wrap; gap: 0.55rem; margin-bottom: 0.85rem; }
.fig-chip { border-left: 2px solid var(--gold); padding: 0.22rem 0.55rem; background: rgba(200,169,110,0.13); }
.fig-val { font-family: var(--font-body); font-weight: bold; font-size: 0.95rem; color: var(--text); display: block; }
.fig-label {
  font-family: var(--font-mono); font-size: 0.68rem;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-mid);
}
.story-source {
  font-family: var(--font-mono); font-size: 0.7rem;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold);
}
.stories-stack { padding-left: 2rem; display: flex; flex-direction: column; }
.story-minor {
  padding: 1rem 0; border-bottom: 0.5px solid var(--border-light); flex: 1;
}
.story-minor:first-child { padding-top: 0; }
.story-minor:last-child { border-bottom: none; padding-bottom: 0; }
.story-minor h3 {
  font-size: 1rem; line-height: 1.25; font-weight: bold; margin-bottom: 0.35rem;
}
.story-minor p { font-size: 0.88rem; color: var(--text-mid); line-height: 1.65; }

/* SECTIONS */
.sections-section { padding: 2rem 0; border-bottom: 1px solid var(--border-light); }
.filter-bar {
  display: none; align-items: center; gap: 0.75rem;
  margin-bottom: 1.25rem; padding: 0.45rem 0.9rem;
  border-left: 3px solid var(--gold); background: rgba(200,169,110,0.06);
  font-family: var(--font-mono); font-size: 0.6rem;
  letter-spacing: 0.08em; color: var(--text-mid);
}
.filter-bar.visible { display: flex; }
.filter-clear {
  background: none; border: none; color: var(--gold); cursor: pointer;
  font-family: var(--font-mono); font-size: 0.6rem; font-weight: bold;
  margin-left: auto; letter-spacing: 0.06em;
}
.sections-grid { display: block; }
.section-pair {
  display: grid; grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid var(--border-light);
}
.section-pair:last-child { border-bottom: none; }
.section-pair-col {
  display: grid; grid-template-rows: subgrid; grid-row: span 4;
  padding: 1.5rem 2rem 1.5rem 0;
  border-right: 1px solid var(--border-light);
}
.section-pair-col:last-child { border-right: none; padding-left: 2rem; padding-right: 0; }
.section-col-header {
  font-family: var(--font-mono); font-size: 1.45rem; font-weight: bold;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
  align-self: end;
}
.item-card { padding: 0.8rem 0; display: flex; flex-direction: column; }
.section-pair-col > .item-card + .item-card { border-top: 1px solid var(--border-light); }
.item-footer { margin-top: auto; padding-top: 0.4rem; }
.item-headline { font-size: 1rem; font-weight: bold; line-height: 1.3; margin-bottom: 0.28rem; }
.item-body { font-size: 0.93rem; color: var(--text-mid); line-height: 1.62; margin-bottom: 0.28rem; }
.item-source {
  font-family: var(--font-mono); font-size: 0.68rem;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--gold);
  display: block; margin-bottom: 0.28rem;
}
.item-kf { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.35rem; }
.item-fig { border-left: 2px solid var(--gold); padding: 0.22rem 0.55rem; background: rgba(200,169,110,0.13); }
.item-fig-val { font-family: var(--font-body); font-weight: bold; font-size: 0.88rem; color: var(--text); display: block; }
.item-fig-label {
  font-family: var(--font-mono); font-size: 0.65rem;
  letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-mid);
}
.item-tags { display: flex; flex-wrap: wrap; gap: 0.28rem; margin-top: 0.4rem; }
.item-tag {
  font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--bg);
  background: var(--gold); border: 1px solid var(--gold); padding: 2px 7px;
  cursor: pointer; transition: all 0.12s;
}
.item-tag:hover, .item-tag.active { background: none; color: var(--text); border-color: rgba(200,169,110,0.7); }

/* BOTTOM ROW */
.bottom-row {
  display: grid; grid-template-columns: 1fr 1.45fr;
  gap: 0; padding: 2rem 0;
}
.reading-col { padding-right: 2rem; border-right: 0.5px solid var(--border); }
.strategic-col { padding-left: 2rem; }
.col-header {
  font-family: var(--font-mono); font-size: 1.45rem; font-weight: bold;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
  margin-bottom: 0.9rem;
}
.reading-item { display: flex; gap: 1.2rem; padding: 0.7rem 0; border-bottom: 0.5px solid var(--border-light); align-items: center; }
.reading-item:last-child { border-bottom: none; }
.reading-num { font-family: var(--font-mono); font-size: 3.6rem; font-weight: bold; line-height: 1; color: var(--gold); flex-shrink: 0; letter-spacing: -0.03em; opacity: 0.85; }
.reading-title { font-size: 0.9rem; font-weight: bold; line-height: 1.3; margin-bottom: 0.12rem; }
.reading-title a { color: inherit; text-decoration: none; }
.reading-title a:hover { color: var(--gold); text-decoration: underline; text-underline-offset: 2px; }
.reading-source {
  font-family: var(--font-mono); font-size: 0.68rem;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--gold);
}
.strategic-box {
  background: var(--tile-bg); color: var(--tile-text);
  padding: 1.4rem 1.5rem; border-left: 3px solid var(--gold);
}
.strategic-target {
  font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 0.7rem;
}
.strategic-body {
  font-size: 0.97rem; color: rgba(232,228,220,0.85); line-height: 1.72;
  margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 0.5px solid rgba(255,255,255,0.07);
}
.actions-label {
  font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: rgba(232,228,220,0.55); margin-bottom: 0.6rem;
}
.action-item { display: flex; gap: 0.6rem; padding: 0.45rem 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); align-items: flex-start; }
.action-item:last-child { border-bottom: none; }
.action-dot { width: 5px; height: 5px; background: var(--gold); flex-shrink: 0; margin-top: 0.42rem; }
.action-text { font-size: 0.95rem; color: rgba(232,228,220,0.87); line-height: 1.62; }

/* FOOTER */
footer {
  padding: 1.2rem 2rem; border-top: 1px solid var(--border-light);
  font-family: var(--font-mono); font-size: 0.78rem;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-mid);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.6rem;
}
footer a { color: var(--gold); text-decoration: none; font-weight: bold; }
footer a:hover { text-decoration: underline; }

/* RESPONSIVE */
@media (max-width: 1000px) {
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .market-grid { grid-template-columns: repeat(3, 1fr); }
  .market-symbol { font-size: 0.85rem; }
  .market-value { font-size: 1.2rem; }
  .section-pair-col { padding-right: 1.5rem; }
  .section-pair-col:last-child { padding-left: 1.5rem; }
  .bottom-row { grid-template-columns: 1fr; }
  .reading-col { border-right: none; padding-right: 0; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-light); }
  .strategic-col { padding-left: 0; padding-top: 1.5rem; }
}
@media (max-width: 680px) {
  .container { padding: 0 1.25rem; }
  .site-header { padding: 0.85rem 1.25rem 0.65rem; }
  .header-top { flex-direction: column; gap: 0.75rem; }
  .header-right { justify-content: space-between; width: 100%; }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); gap: 0.65rem; }
  .market-grid { grid-template-columns: 1fr; }
  .market-tile { padding: 0.65rem 1rem 0.5rem; }
  .market-symbol { font-size: 0.82rem; }
  .market-value { font-size: 1.1rem; }
  .market-mid-row { flex-wrap: wrap; gap: 0.15rem; }
  .top-stories-grid { grid-template-columns: 1fr; }
  .story-main { padding-right: 0; border-right: none; border-bottom: 0.5px solid var(--border-light); padding-bottom: 1.5rem; margin-bottom: 1rem; }
  .stories-stack { padding-left: 0; }
  .section-pair { grid-template-columns: 1fr; border-bottom: none; }
  .section-pair-col { grid-row: span 1; display: block; border-right: none; padding: 1.25rem 0; border-bottom: 1px solid var(--border-light); }
  .section-pair-col:last-child { border-bottom: none; padding-left: 0; }
  .section-pair-col > .item-card + .item-card { border-top: 1px solid var(--border-light); }
  footer { flex-direction: column; text-align: center; gap: 0.3rem; }
}
</style>
</head>

<div id="content">

  <!-- MARKET DATA ROW -->

<script>
const REPO_BASE = 'https://raw.githubusercontent.com/Zimphi75/multikanal/main/data/';

let currentLang = 'de';
let activeTag = null;
let globalData = null;

const UI_STRINGS = {
  de: {
    top: 'Top 3 Entwicklungen',
    reading: 'Leseempfehlungen',
    strategic: 'Strategische Implikationen',
    filtered: tag => `Gefiltert nach: ${tag}`,
    remove: '× Entfernen',
    loading: 'Laden …',
    for: 'Für',
    actions: 'Key Actions'
  },
  en: {
    top: 'Top 3 Developments',
    reading: 'Reading Recommendations',
    strategic: 'Strategic Implications',
    filtered: tag => `Filtered by: ${tag}`,
    remove: '× Clear',
    loading: 'Loading …',
    for: 'For',
    actions: 'Key Actions'
  }
};

function ui(key, ...args) {
  const fn = UI_STRINGS[currentLang][key];
  return typeof fn === 'function' ? fn(...args) : fn;
}

function t(obj, key) {
  return obj[`${key}_${currentLang}`] || obj[`${key}_de`] || '';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── THEME ── */
function initTheme() {
  // localStorage hat Priorität; sonst System-Präferenz
  const saved = localStorage.getItem('mk_theme')
    || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(saved);
}
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  document.getElementById('btn-theme').textContent = t === 'dark' ? '☀' : '☾';
}
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('mk_theme', next);
  applyTheme(next);
}

/* ── LANGUAGE ── */
function initLang() {
  // localStorage hat Priorität; sonst Browser-Sprache
  const saved = localStorage.getItem('mk_lang');
  if (saved) { currentLang = saved; }
  else {
    const browserLang = (navigator.language || 'de').toLowerCase();
    currentLang = browserLang.startsWith('de') ? 'de' : 'en';
  }
  document.getElementById('btn-de').classList.toggle('active', currentLang === 'de');
  document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');
  document.documentElement.lang = currentLang;
}
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('mk_lang', lang);
  document.documentElement.lang = lang;
  document.getElementById('btn-de').classList.toggle('active', lang === 'de');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  if (globalData) rerender();
}

/* ── TAG FILTER ── */
function filterByTag(tag) {
  activeTag = tag;
  document.querySelectorAll('.item-card[data-tags]').forEach(c => {
    c.style.display = c.dataset.tags.split(',').includes(tag) ? '' : 'none';
  });
  document.querySelectorAll('.item-tag').forEach(el =>
    el.classList.toggle('active', el.dataset.tag === tag));
  const bar = document.getElementById('filter-bar');
  bar.classList.add('visible');
  document.getElementById('filter-label').textContent = ui('filtered', tag);
  document.getElementById('filter-clear').textContent = ui('remove');
}
function clearTagFilter() {
  activeTag = null;
  document.querySelectorAll('.item-card[data-tags]').forEach(c => c.style.display = '');
  document.querySelectorAll('.item-tag').forEach(el => el.classList.remove('active'));
  document.getElementById('filter-bar').classList.remove('visible');
}

/* ── METRICS ── */
function collectMetrics(data) {
  const out = [];
  // max. 1 Key Figure pro Artikel → 4 verschiedene Quellen
  (data.top_stories || []).forEach((s, i) => {
    if (out.length >= 4) return;
    const kf = (s.key_figures || [])[0];
    if (kf) out.push({ ...kf, ctx: t(s, 'headline'), anchor: `story-${i}` });
  });
  for (const sec of (data.sections || []))
    for (let idx = 0; idx < (sec.items || []).length; idx++) {
      if (out.length >= 4) return out;
      const item = sec.items[idx];
      const kf = (item.key_figures || [])[0];
      if (kf) out.push({ ...kf, ctx: t(item, 'headline'), anchor: `item-${sec.id}-${idx}` });
    }
  return out;
}
function valueClass(v) { return /[-−]/.test(String(v)) ? 'negative' : 'positive'; }
function barWidth(val, label) {
  const m = String(val).match(/(\d+[\.,]?\d*)\s*%/);
  if (m) return Math.min(parseFloat(m[1].replace(',','.')), 100);
  let h = 0;
  for (const c of String(label)) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return 35 + (h % 55);
}

/* ── RENDER ── */
function renderMeta(m) {
  const kw = m.kw || '–', yr = m.year || '';
  document.getElementById('meta-kw').textContent = `KW ${kw} / ${yr}`;
  const opts = { day: 'numeric', month: 'short' };
  const from = m.date_from ? new Date(m.date_from).toLocaleDateString('de-CH', opts) : '';
  const to   = m.date_to   ? new Date(m.date_to).toLocaleDateString('de-CH', { ...opts, year: 'numeric' }) : '';
  document.getElementById('meta-date').textContent = from && to ? `${from} – ${to}` : '';
  document.getElementById('footer-gen').textContent =
    `Generiert mit ${m.generator || 'n8n + Claude Sonnet'} · ${m.slug || ''}`;
  document.getElementById('page-title').textContent =
    `Swiss Digital Banking Digest · KW ${kw}/${yr} · banking.multikanal.ch`;
  const desc = document.getElementById('page-desc');
  if (desc) desc.setAttribute('content', `Swiss Digital Banking Digest KW ${kw}/${yr} · ${m.slug || ''}`);
}

function renderMetrics(data) {
  const grid = document.getElementById('metrics-grid');
  collectMetrics(data).forEach(kf => {
    const lbl = kf[`label_${currentLang}`] || kf.label_de || '';
    const w = barWidth(kf.value, lbl);
    const tag = kf.anchor ? 'a' : 'div';
    const href = kf.anchor ? ` href="#${esc(kf.anchor)}"` : '';
    grid.innerHTML += `
      <${tag} class="metric-tile"${href}>
        <div class="metric-tag">${esc(lbl)}</div>
        <div class="metric-value ${valueClass(kf.value)}">${esc(kf.value)}</div>
        <div class="metric-context">${esc(kf.ctx || '')}</div>
        <div class="metric-bar-track"><div class="metric-bar-fill" style="width:${w}%"></div></div>
      </${tag}>`;
  });
}

const SECTION_LABELS = {
  regulatory:    { de: 'Regulierung & Compliance', en: 'Regulation & Compliance' },
  market:        { de: 'Markt & Wettbewerb',       en: 'Market & Competition'    },
  ai_tech:       { de: 'KI & Technologie',          en: 'AI & Technology'         },
  international: { de: 'Internationale Trends',     en: 'International Trends'    }
};

function renderItemCard(item, secId, idx) {
  const srcObj = (item.sources || [])[0] || {};
  const h = srcObj.url
    ? `<a href="${esc(srcObj.url)}" target="_blank" rel="noopener">${esc(t(item,'headline'))}</a>`
    : esc(t(item,'headline'));
  const kf = (item.key_figures || []).slice(0,2).map(k =>
    `<div class="item-fig">
      <span class="item-fig-val">${esc(k.value)}</span>
      <span class="item-fig-label">${esc(k[`label_${currentLang}`] || k.label_de)}</span>
    </div>`).join('');
  const tagsArr = item.tags || [];
  const tagHtml = tagsArr.slice(0,3).map(tag =>
    `<span class="item-tag" data-tag="${esc(tag)}">${esc(tag)}</span>`).join('');
  return `<div class="item-card" id="item-${secId}-${idx}" data-tags="${esc(tagsArr.join(','))}">
    <div class="item-headline">${h}</div>
    <p class="item-body">${esc(t(item,'body'))}</p>
    ${srcObj.name ? `<span class="item-source">${esc(srcObj.name)}</span>` : ''}
    <div class="item-footer">

}

function renderSections(sections) {
  const container = document.getElementById('sections-container');
  const PAIRS = [['regulatory','market'],['ai_tech','international']];
  PAIRS.forEach(([id1, id2]) => {
    const sec1 = sections.find(s => s.id === id1);

    const label2 = SECTION_LABELS[id2]?.[currentLang] || (sec2 ? t(sec2,'title') : id2);

    const col2 = `<div class="section-pair-col" id="${id2}">

    pair.innerHTML = col1 + col2;

/* ── EVENTS ── */
document.addEventListener('click', e => {
  if (e.target.closest('.item-tag')) {
    const tag = e.target.closest('.item-tag').dataset.tag;
    tag === activeTag ? clearTagFilter() : filterByTag(tag);
    return;
  }
  if (e.target.closest('#filter-clear')) { clearTagFilter(); return; }
  if (e.target.closest('#btn-de'))    { setLang('de'); return; }
  if (e.target.closest('#btn-en'))    { setLang('en'); return; }
  if (e.target.closest('#btn-theme')) { toggleTheme(); return; }
});

/* ── ISO WEEK ── */
function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return { kw: Math.ceil((((d - yearStart) / 86400000) + 1) / 7), year: d.getUTCFullYear() };
}
function getCandidateSlugs() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('kw')) return [p.get('kw')];
  const slugs = [];
  const now = new Date();
  for (let i = 0; i < 5; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i * 7);
    const { kw, year } = getISOWeek(d);
    slugs.push(`kw${kw}-${year}`);
  }
  return slugs;
}

/* ── LOAD ── */
async function loadDigest() {
  for (const slug of getCandidateSlugs()) {
    try {
      const res = await fetch(`${REPO_BASE}${slug}.json?t=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      globalData = await res.json();
      break;
    } catch(e) { console.log(`Not found: ${slug}`); }
  }
  if (!globalData) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    return;
  }
  renderMeta(globalData.meta || {});
  renderAll(globalData);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

/* —— MARKET DATA —— */
function sparklineSVG(points, up) {
  if (!points || points.length < 2) return '<svg width="100%" height="52"></svg>';
  const w = 300, h = 52, pad = 2;
  const min = Math.min(...points), max = Math.max(...points);
  const rng = max - min || 1;
  const xs = points.map((_, i) => pad + (i / (points.length - 1)) * (w - pad * 2));
  const ys = points.map(v => h - pad - ((v - min) / rng) * (h - pad * 2));
  const poly = xs.map((x, i) => `${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const fill = `${xs[0].toFixed(1)},${h} ` + poly + ` ${xs[xs.length-1].toFixed(1)},${h}`;
  const color = up ? '#2e8b57' : '#c0392b';
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polygon points="${fill}" fill="${color}" opacity="0.12"/>
    <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

const MKT_RANGES = ['1T','1W','1M'];
const MKT_RANGE_LABEL = { '1T':'24h','1W':'7T','1M':'1M','3M':'3M','1J':'1J','ALL':'Gesamt' };
const mktState = {
  'mkt-btc': { range: '1W' }
};

function fmtChf(n) {
  return n >= 1000
    ? n.toLocaleString('de-CH', { maximumFractionDigits: 0 })
    : n.toLocaleString('de-CH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function renderMarketTile(id, label, value, change, points, range, showRanges) {
  const el = document.getElementById(id);
  if (!el) return;
  const pct = change !== null ? (change >= 0 ? '+' : '') + change.toFixed(2) + '%' : 'N/V';
  const cls = change === null ? 'flat' : change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
  const up = change === null ? true : change >= 0;
  const now = new Date().toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
  const rangeLbl = MKT_RANGE_LABEL[range] || range;
  const rangesHtml = showRanges ? `<div class="market-ranges">${MKT_RANGES.map(r =>
    `<button class="mkt-range-btn${r === range ? ' active' : ''}" data-id="${id}" data-range="${r}">${r}</button>`
  ).join('')}</div>` : '';
  el.innerHTML = `
    <div class="market-top-row">
      <div class="market-symbol">${label}</div>
      <div class="market-updated">${now}</div>
    </div>
    <div class="market-mid-row">
      <div class="market-value">${value}</div>
      <div class="market-change ${cls}">${cls==='up'?'▲':cls==='down'?'▼':'–'} ${pct} <span style="font-weight:normal;opacity:0.6">(${rangeLbl})</span></div>
    </div>
    <div class="market-chart">${sparklineSVG(points, up)}</div>
    ${rangesHtml}`;
}

const CG_DAYS = { '1T':'1','1W':'7','1M':'30','3M':'90','1J':'365','ALL':'max' };
const CG_INTERVAL = { '1T':'hourly','1W':'daily','1M':'daily','3M':'daily','1J':'daily','ALL':'weekly' };

async function fetchBTC(range) {
  const el = document.getElementById('mkt-btc');
  if (el) el.style.opacity = '0.5';
  const days = CG_DAYS[range] || '7';
  const interval = CG_INTERVAL[range] || 'daily';
  try {
    const [price, hist] = await Promise.all([
      fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=chf&include_24hr_change=true').then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
      fetch(`https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=chf&days=${days}&interval=${interval}`).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    ]);
    const val = price.bitcoin.chf;
    const pts = (hist.prices || []).map(p => p[1]);
    const first = pts[0], last = pts[pts.length - 1];
    const chg = first ? ((last - first) / first) * 100 : price.bitcoin.chf_24h_change;
    renderMarketTile('mkt-btc', 'BTC / CHF', 'CHF ' + fmtChf(val), chg, pts, range, true);
  } catch(e) {
    const msg = String(e).includes('429') ? 'Limit erreicht – kurz warten' : 'N/V';
    renderMarketTile('mkt-btc', 'BTC / CHF', msg, null, [], range, true);
  } finally {
    if (el) el.style.opacity = '1';
  }
}

const YF_RANGE = { '1T':'1d','1W':'5d','1M':'1mo','3M':'3mo','1J':'1y','ALL':'10y' };
const YF_INTERVAL = { '1T':'15m','1W':'1d','1M':'1d','3M':'1d','1J':'1wk','ALL':'1mo' };

async function fetchYahoo(id, ticker, label, range) {
  const r = YF_RANGE[range] || '5d', iv = YF_INTERVAL[range] || '1d';
  const base = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=${iv}&range=${r}`;
  const urls = [base, `https://corsproxy.io/?url=${encodeURIComponent(base)}`];
  for (const url of urls) {
    try {
      const data = await fetch(url).then(r => r.json());
      const res = data.chart.result[0];
      const closes = res.indicators.quote[0].close.filter(v => v != null);
      const last = closes[closes.length - 1];
      const first = closes[0];
      const chg = first ? ((last - first) / first) * 100 : null;
      renderMarketTile(id, label, fmtChf(last), chg, closes, range, false);
      return;
    } catch { /* try next */ }
  }
  renderMarketTile(id, label, 'N/V', null, [], range, false);
}

async function loadMarketData() {
  const btcR = mktState['mkt-btc'].range;
  await Promise.allSettled([
    fetchBTC(btcR),
    fetchYahoo('mkt-smi', '^SSMI', 'SMI', '1T'),
    fetchYahoo('mkt-spi', '^SPICHA', 'SPI', '1T')
  ]);
}

document.addEventListener('click', e => {

  if (!btn) return;
  const id = btn.dataset.id, range = btn.dataset.range;
  mktState[id].range = range;
  if (id === 'mkt-btc') fetchBTC(range);
});

loadMarketData();
setInterval(loadMarketData, 5 * 60 * 1000); // alle 5 Min aktualisieren

initTheme();
